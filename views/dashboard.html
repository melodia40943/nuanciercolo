<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Révélo — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>
  <nav>
    <span>Révélo — Back office</span>
    <div>
      <a href="/couleurs">Couleurs</a>
      <a href="/packs">Packs</a>
      <form method="POST" action="/logout">
        <button type="submit">Déconnexion</button>
      </form>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>Analytics</h1>
    </div>

    <div id="analytics-content">
      <p class="loading">Chargement…</p>
    </div>
  </main>

  <script>
  fetch('/api/analytics')
    .then(r => {
      if (r.status === 401) { location.href = '/coulisses'; return null; }
      if (r.status === 429) { reportError(429, '/dashboard'); throw new Error('Serveur temporairement surchargé — réessaie dans quelques minutes.'); }
      if (!r.ok) throw new Error(`Erreur serveur (${r.status})`);
      return r.json();
    })
    .then(data => { if (data) render(data); })
    .catch(err => {
      document.getElementById('analytics-content').innerHTML =
        `<p class="error-msg">${err.message}</p>`;
    });

  function n(v) { return Number(v) || 0; }

  function render({ kpis, chart, pages, devices, retention, errors429 }) {
    const mobile  = n(devices?.mobile);
    const desktop = n(devices?.desktop);
    const total   = mobile + desktop || 1;

    // Graphique 30 jours — remplir les jours manquants
    const chartMap = {};
    chart.forEach(r => { chartMap[r.day.slice(0,10)] = r; });
    const days = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0,10);
      days.push({ key, visits: n(chartMap[key]?.visits), uniq: n(chartMap[key]?.uniq) });
    }
    const maxVisits = Math.max(1, ...days.map(d => d.visits));

    const retTotal = n(retention.new) + n(retention.returning) || 1;

    // Labels jours (affiche 1 sur 5)
    const labels = days.map((d, i) => {
      if (i % 5 !== 0) return `<span class="chart-label"></span>`;
      const dt = new Date(d.key + 'T12:00:00');
      return `<span class="chart-label">${dt.getDate()}/${dt.getMonth()+1}</span>`;
    }).join('');

    const bars = days.map(d => {
      const h = Math.round((d.visits / maxVisits) * 100);
      return `<div class="chart-col">
        <span class="tip">${d.key}<br>${d.visits} visite${d.visits>1?'s':''} · ${d.uniq} uniq.</span>
        <div class="chart-bar" style="height:${h}%"></div>
      </div>`;
    }).join('');

    const pagesHtml = pages.length
      ? pages.map(p => `<tr>
          <td><span class="page-name">${p.page}</span></td>
          <td>${n(p.visits)} visites · ${n(p.uniq)} uniq.</td>
        </tr>`).join('')
      : '<tr><td colspan="2" class="pages-empty">Aucune donnée</td></tr>';

    document.getElementById('analytics-content').innerHTML = `
      <div class="analytics-grid">
        ${kpiCard("Aujourd'hui", n(kpis.visits_today), n(kpis.uniq_today) + ' visiteurs uniques')}
        ${kpiCard('7 derniers jours', n(kpis.visits_7d), n(kpis.uniq_7d) + ' visiteurs uniques')}
        ${kpiCard('30 derniers jours', n(kpis.visits_30d), n(kpis.uniq_30d) + ' visiteurs uniques')}
        ${kpiCard('Cette année', n(kpis.visits_year), n(kpis.uniq_year) + ' visiteurs uniques')}
      </div>

      <div class="chart-wrap">
        <h3>Visites — 30 derniers jours</h3>
        <div class="chart">${bars}</div>
        <div class="chart-labels">${labels}</div>
      </div>

      <div class="row-2">
        <div class="panel-card">
          <h3>Nouveaux vs récurrents (30j)</h3>
          <div class="retention-bars">
            <div class="ret-row">
              <div class="ret-label">
                <span>Nouveaux visiteurs</span>
                <strong>${n(retention.new)}</strong>
              </div>
              <div class="ret-track">
                <div class="ret-fill new" style="width:${Math.round(n(retention.new)/retTotal*100)}%"></div>
              </div>
            </div>
            <div class="ret-row">
              <div class="ret-label">
                <span>Visiteurs récurrents</span>
                <strong>${n(retention.returning)}</strong>
              </div>
              <div class="ret-track">
                <div class="ret-fill returning" style="width:${Math.round(n(retention.returning)/retTotal*100)}%"></div>
              </div>
            </div>
          </div>
          <p class="retention-note">
            Total visiteurs uniques : ${n(kpis.uniq_total)} depuis le début
          </p>
        </div>

        <div class="panel-card">
          <h3>Appareils (30j)</h3>
          <div class="device-row">
            <span class="device-icon">📱</span>
            <div class="device-track">
              <div class="device-fill" style="width:${Math.round(mobile/total*100)}%"></div>
            </div>
            <span class="device-count">${mobile}</span>
          </div>
          <div class="device-row">
            <span class="device-icon">💻</span>
            <div class="device-track">
              <div class="device-fill" style="width:${Math.round(desktop/total*100)}%"></div>
            </div>
            <span class="device-count">${desktop}</span>
          </div>
        </div>
      </div>

      <div class="panel-card">
        <h3>Erreurs 429 (Infomaniak)</h3>
        <div class="errors-grid">
          <div><div class="kpi-label">24h</div><div class="errors-count" style="color:${n(errors429?.errors_24h)>0?'#e74c3c':'#27ae60'}">${n(errors429?.errors_24h)}</div></div>
          <div><div class="kpi-label">7 jours</div><div class="errors-count" style="color:${n(errors429?.errors_7d)>0?'#e74c3c':'#27ae60'}">${n(errors429?.errors_7d)}</div></div>
          <div><div class="kpi-label">30 jours</div><div class="errors-count" style="color:${n(errors429?.errors_30d)>0?'#e74c3c':'#27ae60'}">${n(errors429?.errors_30d)}</div></div>
        </div>
        <p class="errors-note">Signalements reçus depuis les navigateurs des utilisatrices</p>
      </div>

      <div class="panel-card panel-card--mt">
        <h3>Pages les plus visitées (30j)</h3>
        <table class="pages-table">
          <tbody>${pagesHtml}</tbody>
        </table>
      </div>
    `;
  }

  function kpiCard(label, value, sub) {
    return `<div class="kpi-card">
      <div class="kpi-label">${label}</div>
      <div class="kpi-value">${value}</div>
      <div class="kpi-sub"><strong>${sub}</strong></div>
    </div>`;
  }
  </script>
<script>
window.reportError = function(code, page) {
  navigator.sendBeacon('/api/report-error',
    new Blob([JSON.stringify({ error_code: code, page: page || location.pathname })],
    { type: 'application/json' })
  );
};
</script>
</body>
</html>
